<!-- templates/403.html -->
<!-- Página de error 403 — acceso denegado por rol incorrecto -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EpiTrack — Acceso Denegado</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 3rem 2rem;
            text-align: center;
            max-width: 420px;
        }
        .icon { font-size: 3.5rem; margin-bottom: 1rem; }
        h1 { color: #dc2626; font-size: 1.5rem; margin-bottom: 0.75rem; }
        p  { color: #6b7280; margin-bottom: 1.5rem; line-height: 1.5; }
        a  {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: #2d6a4f;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover { background: #1b4332; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🚫</div>
    <h1>Acceso Denegado (403)</h1>
    <p>
        Tu perfil <strong>{{ current_user.rol if current_user.is_authenticated else "actual" }}</strong>
        no tiene permiso para acceder a esta sección.
    </p>
    <a href="{{ url_for('auth.login') }}">Volver al inicio</a>
</div>
</body>
</html>
